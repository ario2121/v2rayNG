name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x V2rayNG/gradlew

      - name: Create libs directory
        run: mkdir -p V2rayNG/app/libs

      - name: Get latest XrayLite release URL
        id: get_url
        run: |
          RELEASE_URL=$(curl -s https://api.github.com/repos/2dust/AndroidLibXrayLite/releases/latest \
            | grep "browser_download_url.*libv2ray.aar" \
            | cut -d '"' -f 4)
          echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "Release URL: $RELEASE_URL"

      - name: Download libv2ray.aar
        run: |
          echo "Downloading from: ${{ steps.get_url.outputs.url }}"
          curl -fL "${{ steps.get_url.outputs.url }}" \
            -o V2rayNG/app/libs/libv2ray.aar

      - name: Verify AAR
        run: |
          echo "=== libs content ==="
          ls -lah V2rayNG/app/libs/
          echo "=== file type ==="
          file V2rayNG/app/libs/libv2ray.aar
          echo "=== size ==="
          du -sh V2rayNG/app/libs/libv2ray.aar

      - name: Build Debug APK
        run: |
          cd V2rayNG
          ./gradlew assembleDebug --no-daemon

      - name: List output APKs
        run: |
          find V2rayNG/app/build/outputs/apk -name "*.apk" -type f

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: OviVPN-debug
          path: V2rayNG/app/build/outputs/apk/**/*.apk
          retention-days: 7
